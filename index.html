<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Security Simulation</title>

<style>
body{
margin:0;
background:black;
color:#00ff00;
font-family:monospace;
overflow:hidden;
}

#title{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
font-size:30px;
color:red;
animation:blink 0.8s infinite;
}

#subtitle{
position:absolute;
top:55px;
left:50%;
transform:translateX(-50%);
font-size:14px;
color:white;
}

#terminal{
position:absolute;
top:90px;
left:15px;
width:60%;
height:70%;
overflow:hidden;
font-size:14px;
}

#codebox{
position:absolute;
top:90px;
right:15px;
width:35%;
height:40%;
border:2px solid #00ff00;
overflow:hidden;
font-size:12px;
}

#graph{
position:absolute;
bottom:120px;
right:15px;
width:35%;
height:140px;
border:2px solid #00ff00;
}

#stop{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:red;
color:white;
padding:20px;
font-size:22px;
border:4px solid white;
animation:blink 0.7s infinite;
cursor:pointer;
}

canvas{
position:absolute;
top:0;
left:0;
z-index:-1;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="title">CYBER SECURITY ALERT</div>
<div id="subtitle">Training Simulation</div>

<div id="terminal"></div>
<div id="codebox"></div>
<canvas id="graph"></canvas>

<div id="stop" onclick="location.reload()">STOP SIMULATION</div>

<script>

// MATRIX BACKGROUND

var canvas=document.getElementById("matrix");
var ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

var letters="01ABCDEF#$%&";
letters=letters.split("");

var fontSize=14;
var columns=canvas.width/fontSize;
var drops=[];

for(var x=0;x<columns;x++)
drops[x]=1;

function drawMatrix(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0f0";
ctx.font=fontSize+"px monospace";

for(var i=0;i<drops.length;i++){

var text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(drawMatrix,33);


// TERMINAL LOGS

var logs=[
"Initializing security monitor...",
"Scanning network activity...",
"Running diagnostics...",
"Checking firewall rules...",
"Analyzing packet signatures...",
"Monitoring data streams...",
"Simulation environment active..."
];

var terminal=document.getElementById("terminal");

setInterval(function(){

var line=document.createElement("div");
line.textContent="> "+logs[Math.floor(Math.random()*logs.length)];

terminal.appendChild(line);

terminal.scrollTop=terminal.scrollHeight;

},700);


// CODE STREAM

var codebox=document.getElementById("codebox");

setInterval(function(){

var chars="{}[]<>#@$%^&*()0123456789abcdef";

var line="";

for(var i=0;i<30;i++)
line+=chars[Math.floor(Math.random()*chars.length)];

var div=document.createElement("div");
div.textContent=line;

codebox.appendChild(div);

if(codebox.children.length>30)
codebox.removeChild(codebox.children[0]);

},80);


// GRAPH

var gcanvas=document.getElementById("graph");
var gctx=gcanvas.getContext("2d");

var points=[];

for(let i=0;i<60;i++)
points.push(Math.random()*140);

function drawGraph(){

gctx.fillStyle="black";
gctx.fillRect(0,0,gcanvas.width,gcanvas.height);

gctx.strokeStyle="#00ff00";
gctx.beginPath();

for(let i=0;i<points.length;i++){

gctx.lineTo(i*5,points[i]);

points[i]+=Math.random()*10-5;

if(points[i]<0) points[i]=0;
if(points[i]>140) points[i]=140;

}

gctx.stroke();

}

setInterval(drawGraph,120);


// VOICE ALERT

function voiceAlert(){

var msg=new SpeechSynthesisUtterance("Security simulation active");
msg.volume=1;
msg.rate=0.9;
msg.pitch=1.2;

speechSynthesis.speak(msg);

}

setTimeout(voiceAlert,4000);

</script>

</body>
</html>
