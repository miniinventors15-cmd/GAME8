<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Security Simulation</title>

<style>

body{
margin:0;
background:black;
color:#00ff00;
font-family:monospace;
overflow:hidden;
}

#title{
text-align:center;
color:red;
font-size:26px;
margin-top:10px;
}

#terminal{
position:absolute;
left:20px;
top:100px;
width:45%;
font-size:14px;
line-height:18px;
}

#progress{
position:absolute;
top:70px;
left:20px;
width:45%;
height:18px;
border:1px solid red;
background:#111;
display:none;
}

#bar{
height:100%;
width:0%;
background:red;
}

#activate{
position:absolute;
bottom:40px;
right:40px;
background:red;
color:white;
border:2px solid white;
padding:12px 20px;
font-size:16px;
cursor:pointer;
}

canvas{
position:absolute;
top:0;
left:0;
z-index:-1;
}

</style>
</head>

<body>

<div id="title">CYBER SECURITY SIMULATION</div>

<div id="progress">
<div id="bar"></div>
</div>

<div id="terminal"></div>

<button id="activate">ACTIVATE</button>

<canvas id="matrix"></canvas>

<script>

/* MATRIX RAIN */

let canvas=document.getElementById("matrix");
let ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*";
letters=letters.split("");

let fontSize=14;
let columns=canvas.width/fontSize;

let drops=[];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0F0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);


/* TERMINAL TYPING */

let lines=[
"Booting security scanner...",
"Scanning network...",
"Detecting IP address...",
"IP detected: 192.168.0.23",
"Checking system ports...",
"Accessing system files...",
"Waiting for activation..."
];

let terminal=document.getElementById("terminal");

let lineIndex=0;

function typeLine(){

if(lineIndex<lines.length){

let p=document.createElement("div");
terminal.appendChild(p);

let text=lines[lineIndex];
let i=0;

let typing=setInterval(()=>{

p.textContent+=text[i];
i++;

if(i>=text.length){
clearInterval(typing);
lineIndex++;
setTimeout(typeLine,600);
}

},40);

}

}

typeLine();


/* BUTTON ACTIVATION */

document.getElementById("activate").onclick=function(){

document.getElementById("progress").style.display="block";

let newLines=[
"Activation confirmed...",
"Extracting device data...",
"Reading contacts...",
"Decrypting files...",
"Uploading encrypted packets..."
];

newLines.forEach(line=>{
let p=document.createElement("div");
p.textContent=line;
terminal.appendChild(p);
});

let bar=document.getElementById("bar");
let width=0;

let load=setInterval(()=>{

if(width>=100){
clearInterval(load);
}else{
width++;
bar.style.width=width+"%";
}

},80);


/* voice warning */

let msg=new SpeechSynthesisUtterance(
"Warning. Security breach detected."
);

speechSynthesis.speak(msg);


/* vibration */

if(navigator.vibrate){
navigator.vibrate([300,200,300,200,300]);
}

};

</script>

</body>
</html>
