<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thermal Estimator v2</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
    }
    input, select {
      width: 90%;
      padding: 8px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
    }
    button {
      padding: 10px;
      background: limegreen;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>🔥 Thermal Estimator v2</h2>

  <input type="number" id="batteryTemp" placeholder="Battery Temp °C">

  <select id="mode">
    <option value="idle">Idle</option>
    <option value="gaming">Gaming</option>
    <option value="heavy">Heavy Gaming (BR)</option>
  </select>

  <select id="fps">
    <option value="40">40 FPS</option>
    <option value="60">60 FPS</option>
    <option value="120">120 FPS</option>
  </select>

  <input type="number" id="brightness" placeholder="Brightness %">

  <select id="case">
    <option value="no">No Case</option>
    <option value="yes">Case On</option>
  </select>

  <select id="fan">
    <option value="off">Fan OFF</option>
    <option value="on">Fan ON</option>
  </select>

  <button onclick="calculate()">Estimate</button>

  <h3 id="result"></h3>
</div>

<script>
function calculate() {
  let battery = parseFloat(document.getElementById("batteryTemp").value);
  let mode = document.getElementById("mode").value;
  let fps = parseInt(document.getElementById("fps").value);
  let brightness = parseInt(document.getElementById("brightness").value);
  let caseOn = document.getElementById("case").value;
  let fan = document.getElementById("fan").value;

  if (isNaN(battery)) {
    document.getElementById("result").innerHTML = "Enter battery temp!";
    return;
  }

  let load = 0;

  // Mode
  if (mode === "idle") load += 3;
  if (mode === "gaming") load += 12;
  if (mode === "heavy") load += 18;

  // FPS
  if (fps === 40) load += 3;
  if (fps === 60) load += 6;
  if (fps === 120) load += 12;

  // Brightness
  if (!isNaN(brightness)) load += brightness / 10;

  // Case effect
  if (caseOn === "yes") load += 3;

  // Fan effect
  if (fan === "on") load -= 4;

  let estimated = battery + load;

  let status = "";
  if (estimated < 45) status = "🟢 Cool";
  else if (estimated < 60) status = "🟡 Warm";
  else if (estimated < 75) status = "🟠 Hot";
  else status = "🔴 Very Hot";

  document.getElementById("result").innerHTML =
    `Estimated CPU Temp: ${estimated.toFixed(1)}°C<br>Status: ${status}`;
}
</script>

</body>
</html>
