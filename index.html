<!DOCTYPE html><html>
<head>
<title>Security Breach</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>

body{
margin:0;
background:black;
font-family:monospace;
color:#00ff00;
overflow:hidden;
}

/* MATRIX BACKGROUND */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* TOP WARNING */

#topWarning{
text-align:center;
color:red;
font-size:42px;
margin-top:20px;
}

/* DONT LEAVE */

#dontleave{
text-align:center;
color:#00ff00;
margin-top:10px;
}

/* TERMINAL */

#terminal{
position:absolute;
left:20px;
top:120px;
font-size:16px;
line-height:22px;
}

/* PROGRESS BAR */

#progressBox{
position:absolute;
top:150px;
left:200px;
width:300px;
height:18px;
border:2px solid red;
}

#bar{
height:100%;
width:70%;
background:red;
}

/* COUNTDOWN */

#countdown{
position:absolute;
top:200px;
left:200px;
color:yellow;
font-size:26px;
}

/* ACCESS DENIED */

#denied{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:80px;
color:red;
text-align:center;
}

/* STOP BUTTON */

#stopBtn{
position:absolute;
bottom:60px;
right:60px;
background:red;
color:white;
border:3px solid white;
font-size:26px;
padding:20px 40px;
cursor:pointer;
animation:blink 1s infinite;
}

/* BLINK */

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}

</style></head><body><canvas id="matrix"></canvas>

<div id="topWarning">YOU ARE BEING HACKED</div><div id="dontleave">DONT LEAVE !!!</div><div id="progressBox">
<div id="bar"></div>
</div><div id="countdown">System shutting in 42 sec</div><div id="terminal">
Accessing IP address...<br>
IP FOUND: 192.168.0.23<br>
Scanning device...<br>
Accessing camera...<br>
Camera access granted<br>
Reading messages...<br>
Reading contacts...<br>
Decrypting storage...<br>
Uploading encrypted packets...<br>
</div><div id="denied">ACCESS DENIED</div><button id="stopBtn">CLICK HERE TO STOP</button>

<script>

/* MATRIX EFFECT */

let canvas=document.getElementById("matrix");
let ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*";
letters=letters.split("");

let fontSize=14;
let columns=canvas.width/fontSize;

let drops=[];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0f0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);


/* COUNTDOWN */

let time=42;

setInterval(function(){

time--;

document.getElementById("countdown").innerText="System shutting in "+time+" sec";

},1000);


/* STOP BUTTON */

document.getElementById("stopBtn").onclick=function(){

alert("Security simulation stopped");

location.reload();

}

</script></body>
</html>
