<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Security Simulation</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
overflow:hidden;
margin:0;
}

#matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

#content{
position:relative;
z-index:2;
padding:20px;
}

#title{
color:red;
font-size:45px;
text-align:center;
}

#scan{
margin-top:20px;
}

#progress{
width:100%;
background:#111;
height:25px;
margin-top:10px;
}

#bar{
width:0%;
height:25px;
background:red;
}

#denied{
color:red;
font-size:70px;
text-align:center;
margin-top:70px;
animation:blink 0.7s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

#timer{
text-align:center;
color:yellow;
font-size:24px;
}

#stop{
position:fixed;
bottom:30px;
right:30px;
background:red;
color:white;
padding:15px 25px;
font-size:20px;
border:3px solid white;
z-index:3;
}

body.flash{
animation:alertflash 0.6s infinite;
}

@keyframes alertflash{
0%{background:black;}
50%{background:#200;}
100%{background:black;}
}

body.glitch{
animation:glitch 0.2s infinite;
}

@keyframes glitch{
0%{transform:translate(0);}
20%{transform:translate(-3px,2px);}
40%{transform:translate(3px,-2px);}
60%{transform:translate(-2px,1px);}
80%{transform:translate(2px,-1px);}
100%{transform:translate(0);}
}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div id="content">

<div id="title">YOU ARE BEING HACKED</div>

<div id="scan">

Accessing IP address...<br>
IP FOUND: 192.168.0.24<br>
Scanning device...<br>
Accessing camera...<br>
Camera access granted<br>
Reading messages...<br>
Accessing contacts...<br>

</div>

<div id="progress">
<div id="bar"></div>
</div>

<h2 id="timer">System shutting in 45 sec</h2>

<div id="denied">ACCESS DENIED</div>

</div>

<button id="stop" onclick="stopAll()">CLICK HERE TO STOP</button>

<script>

var canvas=document.getElementById("matrix");
var ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

var letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
letters=letters.split("");

var fontSize=14;
var columns=canvas.width/fontSize;

var drops=[];
for(var x=0;x<columns;x++) drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0F0";
ctx.font=fontSize+"px monospace";

for(var i=0;i<drops.length;i++){

var text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);



var width=0;
var bar=document.getElementById("bar");

setInterval(function(){

width++;

bar.style.width=width+"%";

if(width>100) width=0;

},80);



var time=45;

setInterval(function(){

time--;

document.getElementById("timer").innerHTML="System shutting in "+time+" sec";

if(time<=0) time=45;

},1000);



function voiceWarning(){

for(let i=0;i<10;i++){

setTimeout(function(){

var msg=new SpeechSynthesisUtterance("Warning. Your system has been compromised.");

msg.volume=1;
msg.rate=0.9;
msg.pitch=0.6;

speechSynthesis.speak(msg);

},i*2000);

}

}

voiceWarning();



function vibratePhone(){

if(navigator.vibrate){
navigator.vibrate([300,100,300,100,500]);
}

}

setInterval(vibratePhone,4000);



setInterval(function(){

document.body.classList.toggle("flash");

},1200);



setInterval(function(){

document.body.classList.toggle("glitch");

},500);



function stopAll(){

document.body.innerHTML="<h1 style='color:white;text-align:center;margin-top:40%'>Simulation Stopped</h1>";

}

</script>

</body>
</html>
