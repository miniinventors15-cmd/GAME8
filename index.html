<!DOCTYPE html>
<html>
<head>
<title>System Breach</title>
<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
margin:0;
overflow:hidden;
text-align:center;
}

#warning{
color:red;
font-size:60px;
margin-top:30px;
animation:shake 0.1s infinite;
}

@keyframes shake{
0%{transform:translate(0,0)}
25%{transform:translate(2px,-2px)}
50%{transform:translate(-2px,2px)}
75%{transform:translate(2px,2px)}
100%{transform:translate(-2px,-2px)}
}

#barbox{
width:70%;
height:35px;
border:3px solid lime;
margin:auto;
margin-top:20px;
}

#bar{
height:100%;
width:0%;
background:red;
}

#count{
font-size:35px;
color:yellow;
margin-top:15px;
}

#matrix{
position:absolute;
right:0;
top:0;
width:20%;
height:60%;
font-size:10px;
color:#00ff00;
overflow:hidden;
}

#logs{
position:absolute;
left:10px;
top:220px;
width:50%;
text-align:left;
font-size:18px;
line-height:28px;
}

#stopbox{
position:absolute;
right:30px;
bottom:30px;
background:red;
color:white;
padding:30px;
font-size:30px;
border:4px solid white;
cursor:pointer;
animation:blink 0.8s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

#denied{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
color:red;
display:none;
font-weight:bold;
animation:blink 0.4s infinite;
}

</style>
</head>

<body>

<div id="warning">⚠ YOU ARE BEING HACKED ⚠</div>
<h2>DONT LEAVE !!!</h2>

<div id="barbox">
<div id="bar"></div>
</div>

<div id="count">System shutting in 50 sec</div>

<div id="matrix"></div>
<div id="logs"></div>

<div id="stopbox">CLICK HERE TO STOP</div>

<div id="denied">ACCESS DENIED</div>

<script>

var audioCtx;
var gainNode;
var beepSpeed = 1400;

/* SOUND */

function startStatic(){

audioCtx = new (window.AudioContext || window.webkitAudioContext)();

if (audioCtx.state === "suspended") {
    audioCtx.resume();
}

var bufferSize = 2 * audioCtx.sampleRate;
var noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
var output = noiseBuffer.getChannelData(0);

for (var i = 0; i < bufferSize; i++) {
output[i] = Math.random() * 2 - 1;
}

var noise = audioCtx.createBufferSource();
noise.buffer = noiseBuffer;
noise.loop = true;

gainNode = audioCtx.createGain();
gainNode.gain.value = 0.10;

noise.connect(gainNode);
gainNode.connect(audioCtx.destination);

noise.start();

beepLoop();
}

function beep(){

if(!audioCtx) return;

var osc = audioCtx.createOscillator();
var gain = audioCtx.createGain();

osc.type="square";
osc.frequency.value=1000;

gain.gain.value=0.20;

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();

setTimeout(function(){
osc.stop();
},120);
}

function beepLoop(){
beep();
var delay = Math.random()*beepSpeed;
setTimeout(beepLoop,delay);
}

/* USER INTERACTION */

document.body.addEventListener("click", startStatic, {once:true});
document.body.addEventListener("touchstart", startStatic, {once:true});

/* STOP BUTTON */

document.getElementById("stopbox").onclick=function(){

document.getElementById("denied").style.display="block";

for(let i=0;i<6;i++){
setTimeout(beep,i*100);
}

};

/* LOADING BAR */

var bar=0;
var elem=document.getElementById("bar");

setInterval(function(){
bar++;
elem.style.width=bar+"%";
},100);

/* COUNTDOWN */

var time=50;

setInterval(function(){

time--;

document.getElementById("count").innerHTML =
"System shutting in "+time+" sec";

if(time==10){
beepSpeed = 250;
if(gainNode){
    gainNode.gain.value = 0.18;
}
}

},1000);

/* MATRIX */

var matrix=document.getElementById("matrix");

setInterval(function(){

var chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";
var line="";

for(var i=0;i<35;i++){
line+=chars[Math.floor(Math.random()*chars.length)];
}

matrix.innerHTML=line+"<br>"+matrix.innerHTML;

},50);

/* LOGS */

var logs=[
"Accessing IP address...",
"IP FOUND: 192.168.0.24",
"Scanning device...",
"Accessing camera...",
"Camera access granted",
"Reading messages...",
"Accessing contacts...",
"Extracting passwords...",
"Tracking location...",
"Uploading files...",
"Encrypting storage...",
"System breach complete",
"YOUR FRIEND MADHAVAN MITHRAN MANI ALSO HACKED"
];

var i=0;

setInterval(function(){

if(i<logs.length){
document.getElementById("logs").innerHTML+=logs[i]+"<br>";
i++;
}

},1200);

</script>

</body>
</html>
